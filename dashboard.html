    <script>
        // --- Definir métricas y función PRIMERO para que estén disponibles antes de checkAuth ---
        const metrics = [
            'social_fb', 'social_wa', 'social_ig', 'social_tk', 'social_yt',
            'cat_marketing', 'cat_publicidad', 'cat_web'
        ];

        let serviciosChart = null;

        async function updateMetrics() {
            console.log('--- Actualizando métricas ---');
            for (const key of metrics) {
                try {
                    const url = `https://api.counterapi.dev/v1/axelongosite/${key}/?t=${Date.now()}`;
                    const response = await fetch(url);
                    const elementId = `count-${key}`;
                    const el = document.getElementById(elementId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (el) {
                        el.innerText = (data.count || 0).toLocaleString();
                        el.classList.remove('text-red-500');
                        el.classList.add('text-orange-500');
                    }
                    console.log(`OK [${key}]: ${data.count}`);
                } catch (error) {
                    console.warn(`FAIL [${key}]:`, error.message);
                    const el = document.getElementById(`count-${key}`);
                    if (el) {
                        el.innerText = error.message.includes('HTTP') ? error.message : 'Error Red';
                        el.classList.add('text-red-500');
                    }
                }
                await new Promise(r => setTimeout(r, 100));
            }

            console.log('--- Actualización completada ---');
        }



        // Cargar métricas al inicio
        updateMetrics();

        // Intervalo de 60s
        setInterval(updateMetrics, 60000);
    </script>
